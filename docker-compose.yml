services:
  db:
    image: postgres:16
    container_name: docsasa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-docsasa}
      POSTGRES_USER: ${POSTGRES_USER:-docsasa_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-docsasa_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - docsasa_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docsasa_user} -d ${POSTGRES_DB:-docsasa}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  docsasa_postgres_data:
