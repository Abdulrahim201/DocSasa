databases:
  - name: docsasa-db
    plan: free
    databaseName: docsasa
    user: docsasa_user

services:
  - type: web
    name: docsasa-backend
    env: python # Changed from runtime to env
    plan: free  # Fixed case-sensitivity issue (was 'Free')
    buildCommand: >
      pip install uv &&
      uv sync --frozen &&
      uv run manage.py collectstatic --noinput &&
      uv run manage.py migrate
    startCommand: uv run gunicorn docsasa.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: docsasa-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.smtp.EmailBackend
      - key: EMAIL_HOST
        value: smtp-relay.brevo.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: FRONTEND_BASE_URL
        value: https://docsasa-frontend.onrender.com
      - key: MAX_DOCTORS
        value: "5"
      - key: MIN_BOOKING_LEAD_MINUTES
        value: "60"

  - type: web
    name: docsasa-frontend
    env: static # Changed from runtime to env for blueprint compliance
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://docsasa-backend.onrender.com/api/v1
