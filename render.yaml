databases:
  - name: docsasa-db
    plan: free
    databaseName: docsasa
    user: docsasa_user

services:
  - type: web
    name: docsasa-backend
    env: python
    plan: free
    buildCommand: >
      pip install uv &&
      uv sync --frozen &&
      uv run manage.py collectstatic --noinput &&
      uv run manage.py migrate &&
      uv run manage.py createsuperuser --noinput || true
    startCommand: uv run gunicorn docsasa.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: docsasa-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: EMAIL_BACKEND
        value: anymail.backends.brevo.EmailBackend
      - key: BREVO_API_KEY
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
      - key: FRONTEND_BASE_URL
        value: https://docsasa-frontend.onrender.com
      - key: MAX_DOCTORS
        value: "5"
      - key: MIN_BOOKING_LEAD_MINUTES
        value: "60"

  - type: web
    name: docsasa-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://docsasa-backend.onrender.com/api/v1